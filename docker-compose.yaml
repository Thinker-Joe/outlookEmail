services:
  outlook-mail-reader:
    image: ghcr.io/Thinker-Joe/outlookemail:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:-admin123}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5000/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
